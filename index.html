const getStoredToken = () => {
  const t = lsGet(GDRIVE_AUTH_KEY, null);
  if (!t || !t.access_token) return null;
  if (t.expires_at && Date.now() > t.expires_at - 60000) return null;
  return t;
};

// Attempt silent token refresh via GIS (no popup, uses existing consent).
// Resolves with access_token string, rejects if user hasn't consented yet
// or if GIS isn't loaded yet (e.g. slow network).
const refreshTokenSilently = () => new Promise((resolve, reject) => {
  if (!window.google || !window.google.accounts) {
    reject(new Error('GIS not loaded'));
    return;
  }
  const client = window.google.accounts.oauth2.initTokenClient({
    client_id: GOOG_CLIENT_ID,
    scope: GOOG_SCOPE,
    prompt: '',          // empty = silent re-auth, no popup shown
    callback: (resp) => {
      if (resp.error) { reject(new Error(resp.error)); return; }
      const tokenData = {
        access_token: resp.access_token,
        expires_at: Date.now() + (resp.expires_in * 1000)
      };
      lsSet(GDRIVE_AUTH_KEY, tokenData);
      resolve(resp.access_token);
    }
  });
  client.requestAccessToken();
});

// Get a valid token: use stored if fresh, try silent refresh if we've
// previously signed in, otherwise fall back to full interactive auth tab.
const getOrRefreshToken = async (openTabFallback = false) => {
  const stored = getStoredToken();
  if (stored) return stored.access_token;
  // If we have a stale record at all, the user consented before — try silent
  const stale = lsGet(GDRIVE_AUTH_KEY, null);
  if (stale && stale.access_token) {
    try { return await refreshTokenSilently(); } catch {}
  }
  if (openTabFallback) return openAuthTab();
  return null;
};

const openAuthTab = () => new Promise((resolve, reject) => {
  const authUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'auth.html';
  const tab = window.open(authUrl, '_blank');
  if (!tab) { reject(new Error('popup_blocked')); return; }
  const startTime = Date.now();
  const TIMEOUT_MS = 5 * 60 * 1000;
  const poll = setInterval(() => {
    const stored = getStoredToken();
    if (stored) { clearInterval(poll); resolve(stored.access_token); return; }
    if (tab.closed) {
      clearInterval(poll);
      const finalCheck = getStoredToken();
      if (finalCheck) { resolve(finalCheck.access_token); return; }
      reject(new Error('Tab closed without completing sign-in'));
      return;
    }
    if (Date.now() - startTime > TIMEOUT_MS) {
      clearInterval(poll);
      try { tab.close(); } catch(e) {}
      reject(new Error('Sign-in timed out'));
    }
  }, 500);
});

async function driveFileId(token, filename) {
  if (_driveFileIds[filename]) return _driveFileIds[filename];
  const q = encodeURIComponent(`name='${filename}' and trashed=false`);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  const data = await r.json();
  if (data.files && data.files.length > 0) {
    _driveFileIds[filename] = data.files[0].id;
    _saveFileIdCache();
    return data.files[0].id;
  }
  const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: filename, mimeType: 'application/json' })
  });
  const file = await cr.json();
  _driveFileIds[filename] = file.id;
  _saveFileIdCache();
  return file.id;
}

async function driveRead(token, filename) {
  const fileId = await driveFileId(token, filename);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (r.status === 204 || r.headers.get('content-length') === '0') return null;
  try { return await r.json(); } catch { return null; }
}

async function driveWrite(token, filename, obj) {
  const fileId = await driveFileId(token, filename);
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ mimeType: 'application/json' })], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(obj)], { type: 'application/json' }));
  await fetch(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,
    { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: form }
  );
}

function mergeTags(local, remote) {
  if (!remote) return local;
  const merged = { ...remote };
  Object.entries(local).forEach(([id, ts]) => {
    if (!merged[id] || ts > merged[id]) merged[id] = ts;
  });
  return merged;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

  if (!g) return 'other';
  const arr = Array.isArray(g) ? g : [g];
  for (const raw of arr) {

    const found = Object.keys(GENRES).find(k => k.toLowerCase() === raw.toLowerCase().trim());

// ── DJ classification ────────────────────────────────────────────
// All 19hz events are treated as DJ/club by default.
// Manual override (per-event 'mark live' / 'mark DJ') always wins.
function classifyDJ(event, djOverrides) {
  const override = djOverrides && djOverrides[event.id];
  if (override === 'live') return false;
  if (override === 'dj') return true;
  return event.s === '19hz';
}

// ── Time / end-time inference ─────────────────────────────────────
const pad = n => String(n).padStart(2, '0');

// Parse "HH:MM" or "H:MM" → minutes since midnight, or null
function parseTimeStr(t) {
  if (!t) return null;
  const m = String(t).match(/^(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

// Format minutes since midnight → "HH:MM"
function minsToStr(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${pad(h)}:${pad(m)}`;
}

// Is date string a weekend day (Fri or Sat night = Fri/Sat/Sun morning)?
function isWeekendDate(dateStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const dow = new Date(y, mo - 1, d).getDay();
  return dow === 5 || dow === 6; // Fri or Sat
}

// Infer end time from start time, artist count, event type
// Returns minutes since midnight (may exceed 1440 for next-day)
function inferEndMins(startMins, event) {
  const numActs = artistArray(event.a).length || 1;
  const isWeekend = isWeekendDate(event.d);
  const isDJ = event._isDJ;

  if (isDJ) {
    // DJ sets: nights go long
    return startMins + (isWeekend ? 5 * 60 : 4 * 60);
  }

  // Live shows: ~45-60min per act + opener padding
  // Matinee/afternoon: shorter; night: standard
  if (startMins < 12 * 60) {
    // Matinee
    return startMins + Math.min(numActs * 50, 150);
  } else if (startMins < 17 * 60) {
    // Afternoon
    return startMins + Math.min(numActs * 55, 180);
  } else if (startMins < 21 * 60) {
    // Evening (before 9pm)
    const base = isWeekend ? 4 * 60 : 3 * 60;
    return startMins + Math.min(numActs * 60 + 30, base);
  } else {
    // Late night (9pm+)
    return startMins + (isWeekend ? 5 * 60 : 4 * 60);
  }
}

// Determine effective start minutes (defaulting no-time to 19:00)
function effectiveStartMins(event) {
  const t = event.t_show || event.t;
  const parsed = parseTimeStr(t);
  return parsed !== null ? parsed : 19 * 60; // 7pm default for unknown
}

// Time bucket based on effective start time
// The old bug: events starting after midnight (e.g. 00:30) got bucket by raw clock hour
// Fix: any show with no time defaults to evening; midnight+ shows are "night"
function timeBucket(event) {
  const mins = effectiveStartMins(event);
  // Normalise to 0-1439 for bucket purposes
  const h = Math.floor(mins / 60) % 24;
  if (h >= 6 && h < 12) return 'matinee';
  if (h >= 12 && h < 17) return 'afternoon';
  if (h >= 17 && h < 21) return 'evening';
  return 'night'; // 21:00+ OR 00:00-05:59
}

const timeBucketLabel = {
  'matinee':   '☀ Matinee',
  'afternoon': '🌤 Afternoon',
  'evening':   '🌆 Evening',
  'night':     '🌙 Night'
};
const TB_ORDER = ['matinee', 'afternoon', 'evening', 'night'];

// Has this event ended? (use inferred end time if no explicit end)
function hasEnded(event) {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  if (event.d > todayStr) return false; // future date
  if (event.d < todayStr) return true;  // past date

  // Same day — check time
  const startMins = effectiveStartMins(event);
  const explicitEnd = parseTimeStr(event.te);
  let endMins;
  if (explicitEnd !== null) {
    // If explicit end looks earlier than start, it wraps midnight
    endMins = explicitEnd <= startMins ? explicitEnd + 1440 : explicitEnd;
  } else {
    endMins = inferEndMins(startMins, event);
  }

  // Normalise for comparison (today's clock vs today's event window)
  if (endMins >= 1440) {
    // Ends after midnight — not ended unless nowMins is past (endMins % 1440) tomorrow
    // Simplification: if it's still "today" and end would be tomorrow, not ended
    return false;
  }
  return nowMins > endMins;
}

// Sort key: midpoint of start + inferred end
function midpointMins(event) {
  const start = effectiveStartMins(event);
  const end = inferEndMins(start, event);
  return (start + end) / 2;
}

// ── Data fetch ────────────────────────────────────────────────────
// ── Data fetch ────────────────────────────────────────────────────
// v2.15: events are served by an Apps Script Web App (doGet) which reads
// bay_shows_merged and returns it with CORS headers. No OAuth required —
// the Web App runs as the script owner and is publicly accessible.
// Google sign-in is only for prefs/tags cloud sync.
async function fetchEvents() {
  const cached = lsGet(CACHE_KEY);
  if (cached && cached.ts && Date.now() - cached.ts < TTL_MS && Array.isArray(cached.events)) {
    return { events: cached.events, meta: cached.meta || null, artistLinks: cached.artistLinks || {}, fromCache: true, ts: cached.ts };
  }
  if (!WEB_APP_URL) throw new Error('WEB_APP_URL not configured in index.html');
  const resp = await fetch(WEB_APP_URL);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const trimmed = text.replace(/^\uFEFF/, '').trim();
  let events, meta = null, artistLinks = {};
  const objStart = trimmed.indexOf('{');
  if (objStart !== -1) {
    try {
      const parsed = JSON.parse(trimmed.slice(objStart));
      if (parsed.error) throw new Error('Web App error: ' + parsed.error);
      if (parsed._meta && Array.isArray(parsed.events)) { meta = parsed._meta; events = parsed.events; artistLinks = parsed.artistLinks || {}; }
    } catch(e) { if (String(e.message).startsWith('Web App')) throw e; }
  }
  if (!events) {
    const arrStart = trimmed.indexOf('[');
    const arrEnd = trimmed.lastIndexOf(']');
    if (arrStart === -1 || arrEnd === -1) throw new Error('No JSON found in Web App response');
    events = JSON.parse(trimmed.slice(arrStart, arrEnd + 1));
  }
  const ts = Date.now();
  lsSet(CACHE_KEY, { events, meta, artistLinks, ts });
  return { events, meta, artistLinks, fromCache: false, ts };
}

};

};

// ── Week/month navigation helpers ────────────────────────────────
function nextDayKey(currentDay, dayKeys) {
  const idx = dayKeys.indexOf(currentDay);
  return idx >= 0 && idx < dayKeys.length - 1 ? dayKeys[idx + 1] : null;
}
function nextWeekKey(currentDay, dayKeys) {
  // Next Monday on or after (currentDay + 1)
  const [y, m, d] = currentDay.split('-').map(Number);
  const cur = new Date(y, m - 1, d);
  let target = new Date(cur);
  target.setDate(target.getDate() + 1);
  // Advance to next Monday
  while (target.getDay() !== 1) target.setDate(target.getDate() + 1);
  const targetStr = `${target.getFullYear()}-${pad(target.getMonth()+1)}-${pad(target.getDate())}`;
  // Find the first dayKey >= targetStr
  return dayKeys.find(k => k >= targetStr) || null;
}
function nextMonthKey(currentDay, dayKeys) {
  const [y, m] = currentDay.split('-').map(Number);
  let nm = m + 1, ny = y;
  if (nm > 12) { nm = 1; ny++; }
  const targetStr = `${ny}-${pad(nm)}-01`;
  return dayKeys.find(k => k >= targetStr) || null;
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [events, setEvents] = useState([]);
  const [artistLinks, setArtistLinks] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [cacheInfo, setCacheInfo] = useState(null);
  const [tags, setTags] = useState(() => lsGet(TAGS_KEY, {}));
  const [tickets, setTickets] = useState(() => lsGet(TICKETS_KEY, {}));
  const [hidden, setHidden] = useState(() => lsGet(HIDDEN_KEY, {}));
  const [djOverrides, setDjOverrides] = useState(() => lsGet(DJ_OVERRIDE_KEY, {}));
  const [manual, setManual] = useState(() => lsGet(MANUAL_KEY, []));
  const PREFS_DEFAULTS = {
    view: 'week',
    regions: [],
    genres: [],
    freeOnly: false,
    allAgesOnly: false,
    showSaved: false,
    subgenres: [],
    showDJ: false,
    showHidden: false,
    showTickets: false,
    showStarredNoTicket: false,
    hideRecurring: false,
    recurringOnly: false,
    timeBuckets: [],        // [] = no filter; subset of 'morning'|'matinee'|'evening'|'night'
    timeRange: [0, 1439],   // [startMin, endMin] — mins since midnight
    recencyMode: 'da',      // 'da' = date added, 'dm' = date modified
    recencyWindow: null,    // null | '1d' | '7d' | { since: 'YYYY-MM-DD' }
  };
  const [prefs, setPrefs] = useState(() => {
    // Always merge defaults first so new keys are never undefined
    const stored = lsGet(PREFS_KEY, {});
    const saved = { ...PREFS_DEFAULTS, ...stored };
    const urlView = new URLSearchParams(window.location.search).get('view');
    if (urlView && ['today', 'week', 'month'].includes(urlView)) saved.view = urlView;
    return saved;
  });
  const [expandedDays, setExpandedDays] = useState(() => new Set());
  const [showAdd, setShowAdd] = useState(false);
  const [showInstall, setShowInstall] = useState(true);
  const [showMoreFilters, setShowMoreFilters] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [driveUser, setDriveUser] = useState(null);
  const [driveSyncing, setDriveSyncing] = useState(false);
  const [driveSyncMsg, setDriveSyncMsg] = useState('');
  const [searchQuery, setSearchQuery] = useState('');
  const [artistPanel, setArtistPanel] = useState(null); // { name, event }
  const [venuePanel, setVenuePanel] = useState(null);   // venueName string
  const scrollRef = useRef(null);
  const dayRefs = useRef({}); // { [dayKey]: domNode }

  // Debounced tag write
  const _debouncedTagWrite = useRef(null);
  if (!_debouncedTagWrite.current) {
    _debouncedTagWrite.current = debounce(async (tagObj) => {
      const tok = await getOrRefreshToken();
      if (!tok) return;
      try { await driveWrite(tok, GOOG_TAGS_FILE, tagObj); } catch {}
    }, 600);
  }

  const runDriveSync = useCallback(async (token) => {
    setDriveSyncing(true);
    setDriveSyncMsg('');
    try {
      const ui = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${token}` } });
      const user = await ui.json();
      setDriveUser({ email: user.email });
      const drivePrefs = await driveRead(token, GOOG_PREFS_FILE);
      if (drivePrefs) { savePrefs({ ...PREFS_DEFAULTS, ...prefs, ...drivePrefs }); }
      else { await driveWrite(token, GOOG_PREFS_FILE, prefs); }
      const localTags = lsGet(TAGS_KEY, {});
      const driveTags = await driveRead(token, GOOG_TAGS_FILE);
      if (driveTags) {
        const merged = mergeTags(localTags, driveTags);
        setTags(merged); lsSet(TAGS_KEY, merged);
        await driveWrite(token, GOOG_TAGS_FILE, merged);
        const added = Object.keys(merged).length - Object.keys(localTags).length;
        setDriveSyncMsg(added > 0 ? `Synced — ${added} saved show${added > 1 ? 's' : ''} restored` : 'Synced with Drive');
      } else {
        await driveWrite(token, GOOG_TAGS_FILE, localTags);
        setDriveSyncMsg(`Signed in · ${Object.keys(localTags).length} shows backed up`);
      }
    } catch (e) { setDriveSyncMsg('Sync error: ' + e.message); }
    finally { setDriveSyncing(false); setTimeout(() => setDriveSyncMsg(''), 6000); }
  }, [prefs]);

  useEffect(() => {
    getOrRefreshToken().then(tok => {
      if (!tok) return;
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${tok}` } })
        .then(r => r.json()).then(u => { if (u.email) setDriveUser({ email: u.email }); }).catch(() => {});
    });
  }, []);

  const signInWithGoogle = useCallback(async () => {
    if (!GOOG_CLIENT_ID) { setDriveSyncMsg('Drive sync not configured'); return; }
    setDriveSyncing(true);
    setDriveSyncMsg('Opening Google sign-in tab…');
    try {
      const token = await openAuthTab();
      await runDriveSync(token);
    } catch (e) {
      setDriveSyncMsg(e.message === 'popup_blocked' ? 'Tab blocked — allow pop-ups in Safari settings' : 'Sign-in failed: ' + e.message);
      setDriveSyncing(false);
      setTimeout(() => setDriveSyncMsg(''), 7000);
    }
  }, [runDriveSync]);

  const reSyncDrive = useCallback(async () => {
    const tok = await getOrRefreshToken();
    if (tok) { runDriveSync(tok); return; }
    signInWithGoogle();
  }, [runDriveSync, signInWithGoogle]);

  const syncPrefsToDrive = useCallback(async (newPrefs) => {
    const tok = await getOrRefreshToken();
    if (!tok) return;
    try { await driveWrite(tok, GOOG_PREFS_FILE, newPrefs); } catch {}
  }, []);

  const snapRef = useRef(false);

  const saveTags = t => { setTags(t); lsSet(TAGS_KEY, t); _debouncedTagWrite.current(t); };
  const savePrefs = p => { setPrefs(p); lsSet(PREFS_KEY, p); syncPrefsToDrive(p); };
  const saveManual = m => { setManual(m); lsSet(MANUAL_KEY, m); };

  const load = useCallback(async (force = false) => {
    if (force) { lsSet(CACHE_KEY, null); setRefreshing(true); }
    setError(null);
    try {
      const { events: fetched, meta, artistLinks: fetchedLinks, fromCache, ts } = await fetchEvents();
      if (!snapRef.current) {
        const snap = lsGet(SNAP_KEY, null);
        if (!snap) {
          const newSnap = {};
          fetched.forEach(e => { newSnap[e.id] = 1; });
          lsSet(SNAP_KEY, newSnap);
        }
        snapRef.current = true;
      }
      setEvents(fetched);
      setArtistLinks(fetchedLinks || {});
      const t = todayStr();
      const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
      const tmrwStr = `${tmrw.getFullYear()}-${pad(tmrw.getMonth()+1)}-${pad(tmrw.getDate())}`;
      setExpandedDays(new Set([t, tmrwStr]));
      setCacheInfo({ fromCache, ts, meta });
    } catch (err) {
      setError(err.message);
      const stale = lsGet(CACHE_KEY);
      if (stale && stale.events) { setEvents(stale.events); setArtistLinks(stale.artistLinks || {}); setCacheInfo({ fromCache: true, ts: stale.ts, stale: true }); }
    } finally { setLoading(false); setRefreshing(false); }
  }, []);

  useEffect(() => { load(); }, []);

  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/bay-shows/sw.js').catch(console.warn);
    }
  }, []);

  // Attach DJ classification to events
  const allEvents = useMemo(() => {
    const manualWithFlag = manual.map(e => ({ ...e, _manual: true }));
    return [...manualWithFlag, ...events].map(e => ({
      ...e,
      _isDJ: classifyDJ(e, djOverrides)
    }));
  }, [events, manual, djOverrides]);

  // Filtered events (respects all prefs + search)
  const filtered = useMemo(() => {
    const today = todayStr();
    const q = searchQuery.trim().toLowerCase();
    return allEvents.filter(e => {
      if (!e.d || e.d < today) return false;

      // Remove expired events
      if (hasEnded(e)) return false;

      // Hidden filter
      if (!prefs.showHidden && hidden[e.id]) return false;

      // DJ / club filter — all 19hz events hidden by default
      // showDJ must be explicitly true to surface them
      if (e._isDJ && prefs.showDJ !== true) return false;
      // Recurring filter
      if (prefs.hideRecurring && e.rec) return false;
      if (prefs.recurringOnly && !e.rec) return false;

      if (prefs.freeOnly && !(e.p === '0' || e.p === 0 || e.pr === 'free')) return false;
      if (prefs.allAgesOnly && !(e.age === 'all' || e.age === 'all-ages')) return false;
      if (prefs.showSaved && !tags[e.id]) return false;
      if (prefs.showTickets && !tickets[e.id]) return false;
      if (prefs.showStarredNoTicket && !(tags[e.id] && !tickets[e.id])) return false;
      if (prefs.regions && prefs.regions.length > 0 && !prefs.regions.includes(e.r)) return false;
      if (prefs.genres && prefs.genres.length > 0 && !prefs.genres.includes(resolveGenre(e.g))) return false;
      if (prefs.subgenres && prefs.subgenres.length > 0) {
        const evSgs = Array.isArray(e.sg) ? e.sg : [e.sg || ''];
        if (!prefs.subgenres.some(sg => evSgs.some(s => s === sg || s.toLowerCase() === sg.toLowerCase()))) return false;
      }
      // Time-of-day bucket filter
      if (prefs.timeBuckets && prefs.timeBuckets.length > 0) {
        if (!prefs.timeBuckets.includes(timeBucket(e))) return false;
      }
      // Start/end time range slider
      if (prefs.timeRange && (prefs.timeRange[0] > 0 || prefs.timeRange[1] < 1439)) {
        const { startMins, endMins } = eventTimings(e);
        if (startMins > prefs.timeRange[1] || (endMins % 1440) < prefs.timeRange[0]) return false;
      }
      // Recency filter — da/dm can be "YYYY-MM-DD" string OR ms timestamp number.
      // Normalise both to "YYYY-MM-DD" for comparison.
      if (prefs.recencyWindow) {
        const raw = prefs.recencyMode === 'dm' ? e.dm : e.da;
        if (!raw) return false;
        let evDateStr; // "YYYY-MM-DD"
        if (typeof raw === 'number') {
          const d = new Date(raw);
          evDateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        } else {
          // Already a string — take just the date portion
          evDateStr = String(raw).slice(0, 10);
        }
        const today = todayStr();
        if (prefs.recencyWindow === '1d') {
          if (evDateStr !== today) return false;
        } else if (prefs.recencyWindow === '7d') {
          // today and the 6 prior days
          const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 6);
          const cutoffStr = `${cutoff.getFullYear()}-${pad(cutoff.getMonth()+1)}-${pad(cutoff.getDate())}`;
          if (evDateStr < cutoffStr) return false;
        } else if (prefs.recencyWindow && prefs.recencyWindow.since) {
          if (evDateStr < prefs.recencyWindow.since) return false;
        }
      }
      // Search
      if (q) {
        const haystack = [fmtA(e.a), e.v, fmtSg(e.sg), e.n].filter(Boolean).join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      // View window
      if (prefs.view === 'today') return e.d === today;
      if (prefs.view === 'week') {
        const limit = new Date(); limit.setDate(limit.getDate() + 7);
        const [y, m, d] = e.d.split('-').map(Number);
        return new Date(y, m - 1, d) <= limit;
      }
      return true;
    }).sort((a, b) => {
      if (a.d !== b.d) return a.d < b.d ? -1 : 1;
      return midpointMins(a) - midpointMins(b);
    });
  }, [allEvents, prefs, tags, tickets, hidden, searchQuery]);

  // Group by day → time bucket
  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(e => {
      if (!map[e.d]) map[e.d] = {};
      const tb = timeBucket(e);
      if (!map[e.d][tb]) map[e.d][tb] = [];
      map[e.d][tb].push(e);
    });
    return map;
  }, [filtered]);

  const dayKeys = Object.keys(grouped).sort();
  const today = todayStr();

  // Expand ALL days initially (and on full expand)
  const expandAll = () => setExpandedDays(new Set(dayKeys));
  const collapseAll = () => setExpandedDays(new Set());

  // Auto-expand all days on initial load and whenever filters change
  useEffect(() => {
    if (dayKeys.length > 0) setExpandedDays(new Set(dayKeys));
  }, [dayKeys.join(',')]);

  const toggleDay = (day) => {
    const next = new Set(expandedDays);
    next.has(day) ? next.delete(day) : next.add(day);
    setExpandedDays(next);
  };

  // Jump to a day key by scrolling its ref into view
  const jumpTo = (dayKey) => {
    if (!dayKey) return;
    // Expand that day first
    setExpandedDays(prev => { const s = new Set(prev); s.add(dayKey); return s; });
    setTimeout(() => {
      const el = dayRefs.current[dayKey];
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };

  const toggleTag = id => { const next = { ...tags }; if (next[id]) delete next[id]; else next[id] = Date.now(); saveTags(next); };
  const toggleTicket = id => { const next = { ...tickets }; if (next[id]) delete next[id]; else next[id] = Date.now(); setTickets(next); lsSet(TICKETS_KEY, next); };
  const hideEvent = id => { const next = { ...hidden, [id]: Date.now() }; setHidden(next); lsSet(HIDDEN_KEY, next); };
  const toggleDJ = (id, val) => { const next = { ...djOverrides, [id]: val }; setDjOverrides(next); lsSet(DJ_OVERRIDE_KEY, next); };

  const toggleGenre = g => {
    const genres = prefs.genres || [];
    const wasActive = genres.includes(g);
    const next = wasActive ? genres.filter(x => x !== g) : [...genres, g];
    savePrefs({ ...prefs, genres: next, subgenres: wasActive ? [] : (next.length === 1 ? (prefs.subgenres || []) : []) });
  };

  // Count active secondary filters for badge
  const activeSecondaryCount = [
    prefs.freeOnly, prefs.allAgesOnly, prefs.showSaved, prefs.showTickets,
    prefs.showStarredNoTicket, prefs.showHidden, prefs.showDJ,
    prefs.hideRecurring, prefs.recurringOnly,
    prefs.timeBuckets && prefs.timeBuckets.length > 0,
    prefs.timeRange && (prefs.timeRange[0] > 0 || prefs.timeRange[1] < 1439),
    !!prefs.recencyWindow,
  ].filter(Boolean).length;

  return React.createElement("div", { style: S.app },
    React.createElement("style", null, ANIM_STYLE),
    React.createElement("div", { style: S.appInner },

    // ── Header ──
    React.createElement("div", { style: S.header },
      React.createElement("div", { style: S.headerRow },
        React.createElement("div", { style: S.logo }, "♪"),
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { style: S.title }, "BAY SHOWS"),
          React.createElement("div", { style: S.subtitle },
            loading ? 'loading…' : cacheInfo ? (() => {
              const total = cacheInfo.meta ? cacheInfo.meta.event_count : null;
              const builtAt = cacheInfo.meta && cacheInfo.meta.built_at
                ? new Date(cacheInfo.meta.built_at).toLocaleDateString([], { month: 'short', day: 'numeric' }) : null;
              return `${filtered.length}${total ? '/'+total : ''} shows · ${cacheInfo.fromCache ? 'cached' : 'live'}${cacheInfo.stale ? ' (stale)' : ''}${builtAt ? ' · updated '+builtAt : ''}`;
            })() : `${filtered.length} shows`
          )
        ),
        React.createElement("div", { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
          React.createElement("button", { style: { ...S.actionBtn, color: prefs.showSaved ? 'var(--accent)' : 'var(--text3)' }, onClick: () => savePrefs({ ...prefs, showSaved: !prefs.showSaved }) }, "★"),
          React.createElement("button", { style: S.actionBtn, onClick: () => setShowAdd(true) }, "+"),
          React.createElement("button", { style: { ...S.refreshBtn, opacity: refreshing ? 0.5 : 1 }, onClick: () => load(true), disabled: refreshing }, refreshing ? '↻…' : '↻'),
          driveUser
            ? React.createElement("button", { title: `Synced as ${driveUser.email}`, style: { ...S.actionBtn, color: 'var(--accent)' }, onClick: reSyncDrive }, driveSyncing ? '…' : '☁')
            : GOOG_CLIENT_ID && React.createElement("button", { title: 'Sign in with Google', style: { ...S.actionBtn, color: 'var(--text3)' }, onClick: signInWithGoogle }, driveSyncing ? '…' : '☁̲')
        )
      ),
      // View toggle + expand/collapse controls
      React.createElement("div", { style: { display: 'flex', gap: '8px', marginTop: '8px', alignItems: 'center' } },
        React.createElement("div", { style: S.sectionToggle },
          [['today', 'Today'], ['week', 'Week'], ['month', 'All']].map(([v, l]) =>
            React.createElement("button", { key: v, style: S.sectionBtn(prefs.view === v), onClick: () => savePrefs({ ...prefs, view: v }) }, l)
          )
        ),
        React.createElement("button", { style: { ...S.actionBtn, fontSize: '9px' }, onClick: expandAll }, "expand all"),
        React.createElement("button", { style: { ...S.actionBtn, fontSize: '9px' }, onClick: collapseAll }, "collapse all"),
        // More filters button with badge
        React.createElement("button", {
          style: { ...S.filterChip(showMoreFilters || activeSecondaryCount > 0), marginLeft: 'auto' },
          onClick: () => setShowMoreFilters(v => !v)
        }, `Filters${activeSecondaryCount > 0 ? ` (${activeSecondaryCount})` : ''} ${showMoreFilters ? '▴' : '▾'}`)
      )
    ),

    // ── Search bar ──
    React.createElement("div", { style: S.searchBar },
      React.createElement("input", {
        style: S.searchInput,
        type: 'text',
        placeholder: '🔍 Search artists, venues, tags…',
        value: searchQuery,
        onChange: e => setSearchQuery(e.target.value)
      })
    ),

    // ── More Filters Panel ──
    showMoreFilters && React.createElement(React.Fragment, null,
      React.createElement("div", {
        style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', zIndex: 199, backdropFilter: 'blur(2px)' },
        onClick: () => setShowMoreFilters(false)
      }),
      React.createElement(MoreFiltersPanel, { prefs, savePrefs, onClose: () => setShowMoreFilters(false) })
    ),

    // ── Genre chips ──
    React.createElement("div", { style: S.filters, className: "filter-scroll" },
      GENRE_KEYS.map(g => {
        const active = (prefs.genres || []).includes(g);
        return React.createElement("button", { key: g, style: S.genreChip(GENRES[g].color, active), onClick: () => toggleGenre(g) }, GENRES[g].label);
      })
    ),

    // ── Subgenre chips ──
    (prefs.genres || []).length === 1 && SUBGENRES_BY_TOP[(prefs.genres)[0]] && SUBGENRES_BY_TOP[(prefs.genres)[0]].length > 1 &&
    React.createElement("div", {
      style: { ...S.filters, paddingTop: '3px', paddingBottom: '3px', background: 'var(--bg2)', borderTop: '1px solid var(--border2)' },
      className: "filter-scroll"
    }, SUBGENRES_BY_TOP[(prefs.genres)[0]].map(sg => {
      const sgActive = (prefs.subgenres || []).includes(sg);
      const color = GENRES[(prefs.genres)[0]].color;
      return React.createElement("button", {
        key: sg,
        style: { ...S.filterChip(sgActive), fontSize: '9px', border: sgActive ? `1px solid ${color}` : '1px solid var(--border2)', color: sgActive ? color : 'var(--text2)', background: sgActive ? color + '22' : 'transparent', padding: '2px 7px' },
        onClick: () => { const subs = prefs.subgenres || []; savePrefs({ ...prefs, subgenres: sgActive ? subs.filter(s => s !== sg) : [...subs, sg] }); }
      }, sg);
    })),

    // ── Region chips ──
    React.createElement("div", {
      style: { ...S.filters, paddingTop: '4px', paddingBottom: '6px', borderBottom: '1px solid var(--border2)' },
      className: "filter-scroll"
    }, Object.entries(REGIONS).map(([k, v]) => {
      const active = (prefs.regions || []).includes(k);
      return React.createElement("button", {
        key: k,
        style: S.filterChip(active),
        onClick: () => { const regions = prefs.regions || []; savePrefs({ ...prefs, regions: active ? regions.filter(r => r !== k) : [...regions, k] }); }
      }, v);
    })),

    showInstall && React.createElement(InstallBanner, { onDismiss: () => setShowInstall(false) }),

    // ── Main scroll area ──
    React.createElement("div", { style: S.scroll, ref: scrollRef },
      loading && React.createElement("div", { style: S.loadingWrap },
        React.createElement("div", { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
          [0, 200, 400].map(delay => React.createElement("div", { key: delay, style: { ...S.loadingDot, animationDelay: `${delay}ms` } }))
        ),
        React.createElement("div", null, "fetching bay area shows…")
      ),
      !loading && error && events.length === 0 && React.createElement("div", { style: S.emptyState },
        React.createElement("div", { style: { color: 'var(--red)', marginBottom: '8px' } }, "⚠ ", error),
        React.createElement("div", null, "Could not load events."),
        React.createElement("button", { style: { ...S.actionBtn, marginTop: '12px' }, onClick: () => load(true) }, "Retry")
      ),
      !loading && dayKeys.length === 0 && React.createElement("div", { style: S.emptyState },
        React.createElement("div", null, "No shows match your filters."),
        React.createElement("button", {
          style: { ...S.actionBtn, marginTop: '12px', color: 'var(--accent)' },
          onClick: () => { savePrefs({ ...prefs, genres: [], regions: [], freeOnly: false, allAgesOnly: false, showSaved: false }); setSearchQuery(''); }
        }, "Clear filters")
      ),

      dayKeys.map(day => {
        const isToday = day === today;
        const timeBuckets = grouped[day];
        const count = Object.values(timeBuckets).flat().length;
        const isExpanded = expandedDays.has(day);

        return React.createElement("div", {
          key: day,
          style: S.dayGroup,
          ref: el => { if (el) dayRefs.current[day] = el; }
        },
          // Day header
          React.createElement("div", {
            style: { ...S.dayHeader, color: isToday ? 'var(--accent)' : 'var(--text3)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', userSelect: 'none' },
            onClick: () => toggleDay(day)
          },
            React.createElement("span", null,
              isToday ? '▶ TODAY — ' : '', dateLabel(day),
              React.createElement("span", { style: { fontWeight: 300, marginLeft: '6px', color: 'var(--text3)' } }, count, " shows")
            ),
            React.createElement("div", { style: { display: 'flex', alignItems: 'center', gap: '10px' }, onClick: e => e.stopPropagation() },
              // Jump links
              React.createElement("span", {
                style: S.jumpLink,
                onClick: (e) => { e.stopPropagation(); jumpTo(nextDayKey(day, dayKeys)); }
              }, "next day ↓"),
              React.createElement("span", {
                style: S.jumpLink,
                onClick: (e) => { e.stopPropagation(); jumpTo(nextWeekKey(day, dayKeys)); }
              }, "next week ↓"),
              React.createElement("span", {
                style: S.jumpLink,
                onClick: (e) => { e.stopPropagation(); jumpTo(nextMonthKey(day, dayKeys)); }
              }, "next month ↓"),
              React.createElement("span", { style: { fontSize: '10px', color: 'var(--text3)' } }, isExpanded ? '▾' : '▸')
            )
          ),

          // Events (expanded)
          isExpanded && TB_ORDER.filter(tb => timeBuckets[tb] && timeBuckets[tb].length > 0).map(tb =>
            React.createElement("div", { key: tb },
              React.createElement("div", { style: S.timeDivider }, timeBucketLabel[tb]),
              timeBuckets[tb].map((event, i) =>
                React.createElement(EventCard, {
                  key: event.id,
                  event: event,
                  tags, tickets, hidden, djOverrides,
                  onToggleTag: toggleTag,
                  onToggleTicket: toggleTicket,
                  onHide: hideEvent,
                  onToggleDJ: toggleDJ,
                  onArtistClick: (name) => setArtistPanel({ name }),
                  onVenueClick: (name) => setVenuePanel(name)
                })
              )
            )
          )
        );
      })
    ),

    // ── Status bar ──
    React.createElement("div", { style: S.statusBar },
      cacheInfo && React.createElement(React.Fragment, null,
        React.createElement("span", null, cacheInfo.fromCache ? '◌ cached' : '● live'),
        cacheInfo.ts && React.createElement("span", { style: { color: 'var(--text3)' } }, '· ', new Date(cacheInfo.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }))
      ),
      error && React.createElement("span", { style: { color: 'var(--red)' } }, "⚠ ", error),
      driveUser && !driveSyncMsg && React.createElement("span", { style: { color: 'var(--text3)', fontSize: '10px' } }, '☁ ', driveUser.email.split('@')[0]),
      driveSyncMsg && React.createElement("span", { style: { color: 'var(--accent)', fontSize: '10px' } }, driveSyncMsg),
      React.createElement("span", { style: { marginLeft: 'auto', color: 'var(--text3)' } }, Object.keys(tags).length, " saved",
        Object.keys(tickets).length > 0 ? ` · ${Object.keys(tickets).length} 🎫` : ''
      )
    ),

    ), // end appInner

    // ── Modals ──
    artistPanel && React.createElement(ArtistPanel, {
      artistName:    artistPanel.name,
      events:        allEvents,
      artistLinks:   artistLinks,
      tags,
      tickets,
      onToggleTag:   toggleTag,
      onToggleTicket:toggleTicket,
      onHide:        hideEvent,
      onVenueClick:  (vname) => { setArtistPanel(null); setVenuePanel(vname); },
      onClose:       () => setArtistPanel(null)
    }),
    venuePanel && React.createElement(VenuePanel, {
      venueName:     venuePanel,
      events:        allEvents,
      tags,
      tickets,
      onToggleTag:   toggleTag,
      onToggleTicket:toggleTicket,
      onHide:        hideEvent,
      onArtistClick: (name) => { setVenuePanel(null); setArtistPanel({ name }); },
      onClose:       () => setVenuePanel(null)
    }),
    showAdd && React.createElement(AddModal, { onSave: e => { saveManual([e, ...manual]); }, onClose: () => setShowAdd(false) }),
  );
}

// ── Bootstrap ─────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App, null));
  </script>
</body>
