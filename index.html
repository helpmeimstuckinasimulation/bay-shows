// ── Google Drive OAuth (cloud sync for prefs + tags) ─────────────
// ── Google Drive OAuth — Safari tab flow ─────────────────────────
// Opens auth.html in a new Safari tab (real browser context, not PWA).
// auth.html runs GIS requestAccessToken, writes token to localStorage,
// then closes. This app polls for the tab to close and reads the token.

// In-memory file ID cache so we don't re-query Drive on every write
const _driveFileIds = {};

// Returns stored token { access_token, expires_at } or null
const getStoredToken = () => {
  const t = lsGet(GDRIVE_AUTH_KEY, null);
  if (!t || !t.access_token) return null;
  if (t.expires_at && Date.now() > t.expires_at - 60000) return null; // 60s buffer
  return t;
};

// Open auth.html in a new tab and poll until it closes or a token appears.
// Resolves with access_token string, rejects on timeout or error.
const openAuthTab = () => new Promise((resolve, reject) => {
  // auth.html lives alongside index.html
  const authUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'auth.html';
  const tab = window.open(authUrl, '_blank');
  if (!tab) {
    reject(new Error('popup_blocked'));
    return;
  }

  const startTime = Date.now();
  const TIMEOUT_MS = 5 * 60 * 1000; // 5 min

  const poll = setInterval(() => {
    // Check if token appeared in localStorage (written by auth.html)
    const stored = getStoredToken();
    if (stored) {
      clearInterval(poll);
      resolve(stored.access_token);
      return;
    }
    // Check if tab closed without writing a token
    if (tab.closed) {
      clearInterval(poll);
      // One final check — auth.html may have written just before closing
      const finalCheck = getStoredToken();
      if (finalCheck) { resolve(finalCheck.access_token); return; }
      reject(new Error('Tab closed without completing sign-in'));
      return;
    }
    // Timeout
    if (Date.now() - startTime > TIMEOUT_MS) {
      clearInterval(poll);
      try { tab.close(); } catch(e) {}
      reject(new Error('Sign-in timed out'));
    }
  }, 500);
});

// Generic: find or create a named JSON file in the app's Drive space
async function driveFileId(token, filename) {
  if (_driveFileIds[filename]) return _driveFileIds[filename];
  const q = encodeURIComponent(`name='${filename}' and trashed=false`);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  const data = await r.json();
  if (data.files && data.files.length > 0) {
    _driveFileIds[filename] = data.files[0].id;
    return data.files[0].id;
  }
  // Create empty file
  const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: filename, mimeType: 'application/json' })
  });
  const file = await cr.json();
  _driveFileIds[filename] = file.id;
  return file.id;
}

// Generic: read JSON file from Drive; returns parsed object or null
async function driveRead(token, filename) {
  const fileId = await driveFileId(token, filename);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (r.status === 204 || r.headers.get('content-length') === '0') return null;
  try { return await r.json(); } catch { return null; }
}

// Generic: write JSON object to Drive file
async function driveWrite(token, filename, obj) {
  const fileId = await driveFileId(token, filename);
  const form = new FormData();
  form.append('metadata', new Blob(
    [JSON.stringify({ mimeType: 'application/json' })],
    { type: 'application/json' }
  ));
  form.append('file', new Blob(
    [JSON.stringify(obj)],
    { type: 'application/json' }
  ));
  await fetch(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,
    { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: form }
  );
}

// Tags merge strategy: union of local + Drive, local timestamp wins on conflict
// Both are { [eventId]: epochMs }
function mergeTags(local, remote) {
  if (!remote) return local;
  const merged = { ...remote };
  Object.entries(local).forEach(([id, ts]) => {
    // Keep whichever timestamp is more recent (i.e., more recently saved)
    if (!merged[id] || ts > merged[id]) merged[id] = ts;
  });
  return merged;
}

// Debounce helper for Drive tag writes
function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

// ── localStorage helpers ─────────────────────────────────────────
const lsGet = (key, fallback = null) => {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch {
    return fallback;
  }
};
const lsSet = (key, val) => {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
};

const resolveGenre = (g) => {
  if (!g) return 'other';
  const arr = Array.isArray(g) ? g : [g];
  for (const raw of arr) {
    if (GENRES[raw]) return raw;                       // exact match (new data)
    // Case-insensitive fallback for any legacy data
    const found = Object.keys(GENRES).find(k => k.toLowerCase() === raw.toLowerCase().trim());
    if (found) return found;
  }
  return 'other';
};

// ── Data fetch with 6h TTL ────────────────────────────────────────
async function fetchEvents() {
  // Check cache
  const cached = lsGet(CACHE_KEY);
  if (cached && cached.ts && Date.now() - cached.ts < TTL_MS && Array.isArray(cached.events)) {
    return { events: cached.events, meta: cached.meta || null, fromCache: true, ts: cached.ts };
  }
  // Fetch live
  const resp = await fetch(DRIVE_URL);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const trimmed = text.replace(/^\uFEFF/, '').replace(/[\r\n]/g, '').trim();

  let events, meta = null;

  // Try new format: { _meta, events[] }
  const objStart = trimmed.indexOf('{');
  if (objStart !== -1) {
    try {
      const parsed = JSON.parse(trimmed.slice(objStart));
      if (parsed._meta && Array.isArray(parsed.events)) {
        meta = parsed._meta;
        events = parsed.events;
      }
    } catch {}
  }
  // Fallback: bare array (legacy)
  if (!events) {
    const arrStart = trimmed.indexOf('[');
    const arrEnd = trimmed.lastIndexOf(']');
    if (arrStart === -1 || arrEnd === -1) throw new Error('No JSON found in document');
    events = JSON.parse(trimmed.slice(arrStart, arrEnd + 1));
  }

  const ts = Date.now();
  lsSet(CACHE_KEY, { events, meta, ts });
  return { events, meta, fromCache: false, ts };
}

  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${days[dt.getDay()]} ${months[m - 1]} ${d}`;
};
const isNew = event => {

};

  const base = 'https://calendar.google.com/calendar/render?action=TEMPLATE';
  const title = encodeURIComponent(`${fmtA(event.a) || event.v} @ ${event.v}`);

  // Build date from event.d (YYYY-MM-DD) + event.t (HH:MM or similar)
  const dt = event.d ? event.d.replace(/-/g, '') : '';
  const params = `&text=${title}&location=${loc}&dates=${dt}/${dt}`;

};
