// ── Data fetch with 6h TTL ────────────────────────────────────────
async function fetchEvents() {
  // Check cache
  const cached = lsGet(CACHE_KEY);
  if (cached && cached.ts && Date.now() - cached.ts < TTL_MS && Array.isArray(cached.events)) {
    return {
      events: cached.events,
      fromCache: true,
      ts: cached.ts
    };
  }
  // Fetch live
  const resp = await fetch(DRIVE_URL);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  // Parse JSON — the doc may have a BOM or leading whitespace
  const trimmed = text.replace(/^\uFEFF/, '').trim();
  // Find the JSON array (doc may have header text before it)
  const start = trimmed.indexOf('[');
  const end = trimmed.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('No JSON array found in document');
  const events = JSON.parse(trimmed.slice(start, end + 1));
  const ts = Date.now();
  lsSet(CACHE_KEY, {
    events,
    ts
  });
  return {
    events,
    fromCache: false,
    ts
  };
}
