// ── Constants ────────────────────────────────────────────────────

const getStoredToken = () => {
  const t = lsGet(GDRIVE_AUTH_KEY, null);
  if (!t || !t.access_token || !t.expires_at) return null;
  if (Date.now() > t.expires_at - 60000) return null;
  return t;
};

// Get a valid token: use stored if fresh, try Worker refresh if we have prior
// auth evidence, otherwise optionally open the full auth tab.
const getOrRefreshToken = async (openTabFallback = false) => {
  const stored = getStoredToken();
  if (stored) return stored.access_token;
  const stale = lsGet(GDRIVE_AUTH_KEY, null);
  if (stale && stale.access_token) {
    try { return await refreshViaWorker(); } catch {}
  }
  if (openTabFallback) return openAuthTab();
  return null;
};

const GDRIVE_USER_KEY = 'bay-gdrive-user-v1';   // { email } — survives token expiry
const WORKER_BASE     = 'https://bay-shows-auth.dranahan.workers.dev';
const AUTH_URL        = 'https://helpmeimstuckinasimulation.github.io/bay-shows/auth.html';

// Ask the Cloudflare Worker to mint a new access token via its server-side refresh token.
const refreshViaWorker = async () => {
  const resp = await fetch(`${WORKER_BASE}/refresh`, { credentials: 'include' });
  if (!resp.ok) throw new Error(`refresh_failed:${resp.status}`);
  const data = await resp.json();
  if (!data.access_token) throw new Error('refresh_no_token');
  lsSet(GDRIVE_AUTH_KEY, {
    access_token: data.access_token,
    expires_at: Date.now() + ((data.expires_in || 3600) * 1000),
  });
  return data.access_token;
};

// Proactive refresh: schedule silent renewal 5 min before expiry.
let _refreshTimer = null;
const scheduleTokenRefresh = () => {
  if (_refreshTimer) clearTimeout(_refreshTimer);
  const t = lsGet(GDRIVE_AUTH_KEY, null);
  if (!t || !t.expires_at) return;
  const delay = t.expires_at - Date.now() - 5 * 60 * 1000;
  if (delay <= 0) return;
  _refreshTimer = setTimeout(async () => {
    try { await refreshViaWorker(); scheduleTokenRefresh(); } catch {}
  }, delay);
};

const openAuthTab = () => new Promise((resolve, reject) => {
  const tab = window.open(AUTH_URL, '_blank');
  if (!tab) { reject(new Error('popup_blocked')); return; }

  const TIMEOUT_MS = 5 * 60 * 1000;
  let settled = false;
  const timer = setTimeout(() => {
    if (settled) return;
    settled = true;
    cleanup();
    try { tab.close(); } catch {}
    reject(new Error('Sign-in timed out'));
  }, TIMEOUT_MS);

  // Primary: receive token via postMessage from auth.html
  const onMessage = (event) => {
    if (event.origin !== 'https://helpmeimstuckinasimulation.github.io') return;
    if (!event.data || event.data.type !== 'BAY_SHOWS_AUTH') return;
    if (settled) return;
    settled = true;
    cleanup();
    if (event.data.error) { reject(new Error(event.data.error)); return; }
    const tokenData = {
      access_token: event.data.access_token,
      expires_at: event.data.expires_at || (Date.now() + ((event.data.expires_in || 3600) * 1000)),
    };
    lsSet(GDRIVE_AUTH_KEY, tokenData);
    resolve(event.data.access_token);
  };
  window.addEventListener('message', onMessage);

  // Secondary: BroadcastChannel (same-origin, works when opener ref is unavailable)
  let bc = null;
  try {
    bc = new BroadcastChannel('bay_shows_auth');
    bc.onmessage = (event) => {
      if (!event.data || event.data.type !== 'BAY_SHOWS_AUTH') return;
      if (settled) return;
      settled = true;
      cleanup();
      if (event.data.error) { reject(new Error(event.data.error)); return; }
      const tokenData = {
        access_token: event.data.access_token,
        expires_at: event.data.expires_at || (Date.now() + 3600 * 1000),
      };
      lsSet(GDRIVE_AUTH_KEY, tokenData);
      resolve(event.data.access_token);
    };
  } catch(e) { bc = null; }

  // Tertiary: poll localStorage for browsers where the above cross-context
  const poll = setInterval(() => {
    if (settled) { clearInterval(poll); return; }
    const t = lsGet(GDRIVE_AUTH_KEY, null);
    if (t && t.access_token) {
      settled = true;
      cleanup();
      resolve(t.access_token);
      return;
    }
    if (tab.closed) {
      clearInterval(poll);
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('Tab closed without completing sign-in'));
    }
  }, 500);

  function cleanup() {
    clearTimeout(timer);
    clearInterval(poll);
    window.removeEventListener('message', onMessage);
    try { if (bc) bc.close(); } catch {}
  }
});

async function driveFileId(token, filename) {
  if (_driveFileIds[filename]) return _driveFileIds[filename];
  const q = encodeURIComponent(`name='${filename}' and trashed=false`);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  const data = await r.json();
  if (data.files && data.files.length > 0) {
    _driveFileIds[filename] = data.files[0].id;
    _saveFileIdCache();
    return data.files[0].id;
  }
  const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: filename, mimeType: 'application/json' })
  });
  const file = await cr.json();
  _driveFileIds[filename] = file.id;
  _saveFileIdCache();
  return file.id;
}

async function driveRead(token, filename) {
  const fileId = await driveFileId(token, filename);
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (r.status === 204 || r.headers.get('content-length') === '0') return null;
  try { return await r.json(); } catch { return null; }
}

async function driveWrite(token, filename, obj) {
  const fileId = await driveFileId(token, filename);
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ mimeType: 'application/json' })], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(obj)], { type: 'application/json' }));
  await fetch(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,
    { method: 'PATCH', headers: { Authorization: `Bearer ${token}` }, body: form }
  );
}

function mergeTags(local, remote) {
  if (!remote) return local;
  const merged = { ...remote };
  Object.entries(local).forEach(([id, ts]) => {
    if (!merged[id] || ts > merged[id]) merged[id] = ts;
  });
  return merged;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

// ── localStorage helpers ─────────────────────────────────────────
const lsGet = (key, fallback = null) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
};
const lsSet = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

// ── Overrides helpers ────────────────────────────────────────────
// Load the overrides store, initialising from legacy MANUAL_KEY adds if needed.
function loadOverrides() {
  const stored = lsGet(OVERRIDES_KEY, null);
  if (stored && typeof stored === 'object') return stored;
  // First run: migrate any existing manual events into overrides.adds
  const legacy = lsGet(MANUAL_KEY, []);
  const migrated = {
    adds:    legacy.map(e => ({ ...e, submittedAt: e.da || Date.now() })),
    edits:   [],
    cancels: [],
  };
  lsSet(OVERRIDES_KEY, migrated);
  return migrated;
}

function saveOverrides(ov) { lsSet(OVERRIDES_KEY, ov); }

// When a manually-added event is superseded by a server event (same date + venue,
// different ID), migrate tags/tickets/hidden from the old ID to the new one and
// remove the old local add so it doesn't show as a duplicate.
// Called once each time fresh events are loaded.
function migrateSupersededLocalAdds(fetchedEvents, tagsObj, ticketsObj, hiddenObj) {
  const ov = loadOverrides();
  if (!ov.adds || ov.adds.length === 0) return null; // nothing to migrate

  // Build lookup: "YYYY-MM-DD|venueslug" → server event id
  const normalize = s => String(s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  const serverIndex = {};
  fetchedEvents.forEach(e => {
    if (!e.d || !e.v) return;
    const key = `${e.d}|${normalize(e.v)}`;
    serverIndex[key] = e.id;
  });

  let tagsChanged = false, ticketsChanged = false, hiddenChanged = false;
  const newTags    = { ...tagsObj };
  const newTickets = { ...ticketsObj };
  const newHidden  = { ...hiddenObj };
  const survivingAdds = [];

  ov.adds.forEach(localEvent => {
    if (!localEvent.d || !localEvent.v) { survivingAdds.push(localEvent); return; }
    const key = `${localEvent.d}|${normalize(localEvent.v)}`;
    const serverId = serverIndex[key];
    if (!serverId || serverId === localEvent.id) {
      // No server match, or already same ID — keep as-is
      survivingAdds.push(localEvent);
      return;
    }
    // Server has taken over this event — migrate associations
    if (newTags[localEvent.id])    { newTags[serverId]    = newTags[localEvent.id];    delete newTags[localEvent.id];    tagsChanged    = true; }
    if (newTickets[localEvent.id]) { newTickets[serverId] = newTickets[localEvent.id]; delete newTickets[localEvent.id]; ticketsChanged = true; }
    if (newHidden[localEvent.id])  { newHidden[serverId]  = newHidden[localEvent.id];  delete newHidden[localEvent.id];  hiddenChanged  = true; }
    // Don't keep the local add — the server event replaces it
  });

  // Persist updated overrides if any local adds were removed
  if (survivingAdds.length !== ov.adds.length) {
    ov.adds = survivingAdds;
    saveOverrides(ov);
  }

  return {
    tags:    tagsChanged    ? newTags    : null,
    tickets: ticketsChanged ? newTickets : null,
    hidden:  hiddenChanged  ? newHidden  : null,
  };
}

// A local submission is "pending" if built_at predates the submission.
// builtAt is the ISO string from _meta.built_at; submittedAt is epoch ms.
function isPending(submittedAt, builtAt) {
  if (!submittedAt) return false;
  if (!builtAt) return true; // no build timestamp yet → treat as pending
  return submittedAt > new Date(builtAt).getTime();
}

const resolveGenre = (g) => {
  if (!g) return 'other';
  const arr = Array.isArray(g) ? g : [g];
  for (const raw of arr) {
    if (GENRES[raw]) return raw;
    const found = Object.keys(GENRES).find(k => k.toLowerCase() === raw.toLowerCase().trim());
    if (found) return found;
  }
  return 'other';
};

// ── DJ classification ────────────────────────────────────────────
// All 19hz events are treated as DJ/club by default.
// Manual override (per-event 'mark live' / 'mark DJ') always wins.
function classifyDJ(event, djOverrides) {
  const override = djOverrides && djOverrides[event.id];
  if (override === 'live') return false;
  if (override === 'dj') return true;
  return event.s === '19hz';
}

// ── Time / end-time inference ─────────────────────────────────────
const pad = n => String(n).padStart(2, '0');

// Parse "HH:MM" or "H:MM" → minutes since midnight, or null
function parseTimeStr(t) {
  if (!t) return null;
  const s = String(t).trim().toLowerCase();
  const bare = s.match(/^(\d{1,2})(am|pm)$/);
  if (bare) {
    let h = parseInt(bare[1]);
    const isPM = bare[2] === 'pm';
    if (h === 12) h = isPM ? 12 : 0;
    else if (isPM) h += 12;
    return h * 60;
  }
  const hm12 = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
  if (hm12) {
    let h = parseInt(hm12[1]);
    const m = parseInt(hm12[2]);
    const isPM = hm12[3] === 'pm';
    if (h === 12) h = isPM ? 12 : 0;
    else if (isPM) h += 12;
    return h * 60 + m;
  }
  const hm24 = s.match(/^(\d{1,2}):(\d{2})$/);
  if (hm24) return parseInt(hm24[1]) * 60 + parseInt(hm24[2]);
  return null;
}

function minsToDisplay(mins) {
  const total = ((mins % 1440) + 1440) % 1440;
  const h24 = Math.floor(total / 60);
  const m   = total % 60;
  const ampm = h24 < 12 ? 'am' : 'pm';
  const h12  = h24 % 12 || 12;
  return m === 0 ? `${h12}${ampm}` : `${h12}:${pad(m)}${ampm}`;
}

function minsToStr(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${pad(h)}:${pad(m)}`;
}

function isWeekendDate(dateStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const dow = new Date(y, mo - 1, d).getDay();
  return dow === 5 || dow === 6;
}

function inferEndMins(startMins, event) {
  const numActs = Math.max(artistArray(event.a).length, 1);
  const isWeekend = isWeekendDate(event.d);
  const isDJ = event._isDJ;
  if (isDJ) return startMins + (isWeekend ? 5 * 60 : 4 * 60);
  const h = Math.floor(startMins / 60) % 24;
  if (h < 12) return startMins + Math.min(numActs * 45, 150);
  if (h < 17) return startMins + Math.min(numActs * 50, 180);
  if (h < 21) return startMins + Math.min(numActs * 60 + 30, isWeekend ? 240 : 210);
  return startMins + Math.min(numActs * 60, isWeekend ? 300 : 240);
}

function eventTimings(event) {
  const showMins  = parseTimeStr(event.t_show  || null);
  const doorsMins = parseTimeStr(event.t_doors || event.t || null);
  const endParsed = parseTimeStr(event.te || null);
  const startMins = showMins  !== null ? showMins
                  : doorsMins !== null ? doorsMins
                  : 19 * 60;
  const hasTime = showMins !== null || doorsMins !== null;
  let endMins, endExplicit;
  if (endParsed !== null) {
    endMins = endParsed <= startMins ? endParsed + 1440 : endParsed;
    endExplicit = true;
  } else {
    endMins = inferEndMins(startMins, event);
    endExplicit = false;
  }
  return { startMins, endMins, doorsMins, showMins, endExplicit, hasTime };
}

function effectiveStartMins(event) {
  return eventTimings(event).startMins;
}

function timeBucket(event) {
  const h = Math.floor(effectiveStartMins(event) / 60) % 24;
  if (h >= 6  && h < 12) return 'morning';
  if (h >= 12 && h < 17) return 'matinee';
  if (h >= 17 && h < 21) return 'evening';
  return 'night';
}

const timeBucketLabel = {
  'morning': '🌅 Morning',
  'matinee': '☀️ Matinee',
  'evening': '🌆 Evening',
  'night':   '🌙 Night',
};
const TB_ORDER = ['morning', 'matinee', 'evening', 'night'];

function hasEnded(event) {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const tStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  if (event.d > tStr) return false;
  if (event.d < tStr) return true;
  const { endMins } = eventTimings(event);
  if (endMins >= 1440) return false;
  return nowMins > endMins;
}

function midpointMins(event) {
  const { startMins, endMins } = eventTimings(event);
  return (startMins + endMins) / 2;
}

// ── Data fetch ────────────────────────────────────────────────────
// ── Data fetch ────────────────────────────────────────────────────
// v2.15: events are served by an Apps Script Web App (doGet) which reads
// bay_shows_merged and returns it with CORS headers. No OAuth required —
// the Web App runs as the script owner and is publicly accessible.
// Google sign-in is only for prefs/tags cloud sync.
async function fetchEvents() {
  const cached = lsGet(CACHE_KEY);
  if (cached && cached.ts && Date.now() - cached.ts < TTL_MS && Array.isArray(cached.events)) {
    return { events: cached.events, meta: cached.meta || null, artistLinks: cached.artistLinks || {}, fromCache: true, ts: cached.ts };
  }
  if (!WEB_APP_URL) throw new Error('WEB_APP_URL not configured in index.html');
  const resp = await fetch(WEB_APP_URL);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const trimmed = text.replace(/^\uFEFF/, '').trim();
  let events, meta = null, artistLinks = {};
  const objStart = trimmed.indexOf('{');
  if (objStart !== -1) {
    try {
      const parsed = JSON.parse(trimmed.slice(objStart));
      if (parsed.error) throw new Error('Web App error: ' + parsed.error);
      if (parsed._meta && Array.isArray(parsed.events)) { meta = parsed._meta; events = parsed.events; artistLinks = parsed.artistLinks || {}; }
    } catch(e) { if (String(e.message).startsWith('Web App')) throw e; }
  }
  if (!events) {
    const arrStart = trimmed.indexOf('[');
    const arrEnd = trimmed.lastIndexOf(']');
    if (arrStart === -1 || arrEnd === -1) throw new Error('No JSON found in Web App response');
    events = JSON.parse(trimmed.slice(arrStart, arrEnd + 1));
  }
  const ts = Date.now();
  lsSet(CACHE_KEY, { events, meta, artistLinks, ts });
  return { events, meta, artistLinks, fromCache: false, ts };
}

// ── Date helpers ──────────────────────────────────────────────────
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const dateLabel = dateStr => {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${days[dt.getDay()]} ${months[m - 1]} ${d}`;
};
const isNew = event => {
  const snap = lsGet(SNAP_KEY, {});
  return snap && !snap[event.id];
};
const gcalUrl = event => {
  const base = 'https://calendar.google.com/calendar/render?action=TEMPLATE';
  const title = encodeURIComponent(`${fmtA(event.a) || event.v} @ ${event.v}`);
  const loc = encodeURIComponent(event.v);
  const dt = event.d ? event.d.replace(/-/g, '') : '';
  const params = `&text=${title}&location=${loc}&dates=${dt}/${dt}`;
  return base + params;
};

// ── Week/month navigation helpers ────────────────────────────────
function nextDayKey(currentDay, dayKeys) {
  const idx = dayKeys.indexOf(currentDay);
  return idx >= 0 && idx < dayKeys.length - 1 ? dayKeys[idx + 1] : null;
}
function nextWeekKey(currentDay, dayKeys) {
  // Next Monday on or after (currentDay + 1)
  const [y, m, d] = currentDay.split('-').map(Number);
  const cur = new Date(y, m - 1, d);
  let target = new Date(cur);
  target.setDate(target.getDate() + 1);
  // Advance to next Monday
  while (target.getDay() !== 1) target.setDate(target.getDate() + 1);
  const targetStr = `${target.getFullYear()}-${pad(target.getMonth()+1)}-${pad(target.getDate())}`;
  // Find the first dayKey >= targetStr
  return dayKeys.find(k => k >= targetStr) || null;
}
function nextMonthKey(currentDay, dayKeys) {
  const [y, m] = currentDay.split('-').map(Number);
  let nm = m + 1, ny = y;
  if (nm > 12) { nm = 1; ny++; }
  const targetStr = `${ny}-${pad(nm)}-01`;
  return dayKeys.find(k => k >= targetStr) || null;
}

// ── Add Modal ─────────────────────────────────────────────────────
function AddModal({ onSave, onClose, driveUser, venueList }) {
  const VENUE_OTHER = '__other__';
  const [form, setForm] = useState({
    a: '', v: '', vOther: '', d: todayStr(),
    tDoors: '', tStart: '', tEnd: '',
    g: 'Rock', p: '', age: '', n: '', lk: ''
  });
  const [submitting, setSubmitting] = useState(false);
  const [submitMsg, setSubmitMsg]   = useState('');
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  // Resolved venue: use vOther text when dropdown is set to __other__
  const resolvedVenue = form.v === VENUE_OTHER ? form.vOther.trim() : form.v;

  // Compose time string for the event: prefer tStart, fallback to tDoors
  const resolvedTime = (form.tStart || form.tDoors || '').trim();

  const handleSave = async () => {
    if (!form.a.trim() && !resolvedVenue) return;

    const payload = {
      ...form,
      v:  resolvedVenue,
      t:  resolvedTime,
      te: form.tEnd.trim(),
    };
    // Strip internal fields not part of the event schema
    delete payload.vOther; delete payload.tDoors; delete payload.tStart; delete payload.tEnd;

    // If user is signed in with Google, try to submit to the shared community sheet.
    // CORS note: Apps Script Web Apps don't handle OPTIONS preflight, so we use
    // mode:'no-cors' with Content-Type:'text/plain' to skip it. The response is
    // opaque (unreadable) but the POST still reaches the server if it doesn't throw.
    if (driveUser && COMMUNITY_ENDPOINT) {
      setSubmitting(true);
      setSubmitMsg('Submitting…');
      try {
        const tok = await getOrRefreshToken();
        if (!tok) throw new Error('no_token');

        await submitToServer(tok, { type: 'add', event: payload });
        // no-cors: if fetch didn't throw, the POST reached the server
        setSubmitMsg('✓ Submitted — will appear after next nightly rebuild');
        const id = `community-${Date.now()}`;
        const newEvent = { ...payload, id, so: 'community', s: 'community', community: true,
                           submittedBy: driveUser.email, da: Date.now(), dm: Date.now(),
                           submittedAt: Date.now() };
        // Store in overrides.adds
        const ov = loadOverrides();
        ov.adds = [newEvent, ...ov.adds];
        saveOverrides(ov);
        onSave(newEvent);
        setTimeout(onClose, 1800);
        return;
      } catch(err) {
        const msg = err.message === 'no_token' ? 'Not signed in — saved locally'
                  : 'Network error — saved locally';
        setSubmitMsg(msg);
        setTimeout(() => {
          const id = `manual-${Date.now()}`;
          onSave({ ...payload, id, so: 'manual', da: Date.now(), dm: Date.now() });
          onClose();
        }, 1800);
        return;
      } finally {
        setSubmitting(false);
      }
    }

    // Not signed in — local only
    const id = `manual-${Date.now()}`;
    onSave({ ...payload, id, so: 'manual', da: Date.now(), dm: Date.now() });
    onClose();
  };

  const isSignedIn = !!driveUser;

  const field = (label, key, placeholder, hint) =>
    React.createElement("div", { style: S.inputGroup },
      React.createElement("label", { style: S.label },
        label,

                 marginBottom: '10px', paddingBottom: '8px', borderBottom: '1px solid var(--border2)' }
      }, isSignedIn
        ? `✓ ${driveUser.email} — event will be shared with all users after nightly rebuild`
        : '⚠ Sign in with Google (sync icon) to share events with all users'),

      // Artists
      React.createElement("div", { style: S.inputGroup },
        React.createElement("label", { style: S.label },
          "Artists",
          React.createElement("span", { style: { color: 'var(--text3)', fontWeight: 'normal', marginLeft: '6px' } }, "separate multiple with commas")
        ),
        React.createElement("input", {
          style: S.input, value: form.a, onChange: set('a'),
          placeholder: "Headliner, Support Act, Opener"
        })
      ),

      // Venue dropdown + Other text field
      React.createElement("div", { style: S.inputGroup },
        React.createElement("label", { style: S.label }, "Venue"),
        React.createElement("select", { style: S.input, value: form.v, onChange: set('v') },
          React.createElement("option", { value: "" }, "— select venue —"),
          (venueList || []).map(v => React.createElement("option", { key: v, value: v }, v)),
          React.createElement("option", { value: VENUE_OTHER }, "Other (type below)")
        ),
        form.v === VENUE_OTHER && React.createElement("input", {
          style: { ...S.input, marginTop: '4px' },
          value: form.vOther, onChange: set('vOther'),
          placeholder: "Venue name"
        })
      ),

      // Date
      field("Date", "d", "YYYY-MM-DD"),

      // Times — three fields in a row
      React.createElement("div", { style: S.inputGroup },

        React.createElement("div", { style: { display: 'flex', gap: '6px' } },
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { style: { fontSize: '9px', color: 'var(--text3)', marginBottom: '2px' } }, "Doors"),
            React.createElement("input", { style: S.input, value: form.tDoors, onChange: set('tDoors'), placeholder: "19:00" })
          ),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { style: { fontSize: '9px', color: 'var(--text3)', marginBottom: '2px' } }, "Show starts"),

          )

        React.createElement("label", { style: S.label }, "Genre"),
        React.createElement("select", { style: S.input, value: form.g, onChange: set('g') },
          GENRE_KEYS.map(g => React.createElement("option", { key: g, value: g }, GENRES[g].label))
        )
      ),

      // Price + Ages in a row
      React.createElement("div", { style: { display: 'flex', gap: '8px' } },
        React.createElement("div", { style: { ...S.inputGroup, flex: 1 } },
          React.createElement("label", { style: S.label }, "Price"),
          React.createElement("input", { style: S.input, value: form.p, onChange: set('p'), placeholder: "e.g. 15" })
        ),
        React.createElement("div", { style: { ...S.inputGroup, flex: 1 } },
          React.createElement("label", { style: S.label }, "Ages"),
          React.createElement("select", { style: S.input, value: form.age, onChange: set('age') },
            React.createElement("option", { value: "" }, "—"),
            React.createElement("option", { value: "all" }, "All ages"),
            React.createElement("option", { value: "21+" }, "21+"),
            React.createElement("option", { value: "18+" }, "18+")
          )
        )
      ),

      // Link
      field("Link / Tickets URL", "lk", "https://…"),

      // Notes
      React.createElement("div", { style: S.inputGroup },
        React.createElement("label", { style: S.label }, "Notes"),
        React.createElement("textarea", { style: { ...S.input, height: '52px', resize: 'vertical' }, value: form.n, onChange: set('n') })
      ),

      submitMsg && React.createElement("div", {
        style: { fontSize: '11px', color: submitMsg.startsWith('✓') ? 'var(--green)' : 'var(--accent)',
                 margin: '6px 0', textAlign: 'center' }
      }, submitMsg),

      React.createElement("button", {
        style: { ...S.btnPrimary, opacity: submitting ? 0.6 : 1 },
        onClick: handleSave, disabled: submitting
      }, submitting ? 'Submitting…' : (isSignedIn ? 'Share Event' : 'Save Locally')),
      React.createElement("button", { style: S.btnSecondary, onClick: onClose }, "Cancel")
    )
  );
}

// ── Install Banner ────────────────────────────────────────────────
function InstallBanner({ onDismiss }) {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone || !isIOS) return null;
  return React.createElement("div", { style: S.installBanner },
    React.createElement("span", { style: { fontSize: '16px' } }, "⬆"),
    React.createElement("span", { style: { flex: 1 } }, 'Tap Share then "Add to Home Screen" to install'),
    React.createElement("button", { style: { color: 'var(--text3)', fontSize: '14px' }, onClick: onDismiss }, "×")
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [events, setEvents] = useState([]);
  const [artistLinks, setArtistLinks] = useState({});
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [cacheInfo, setCacheInfo] = useState(null);
  const [tags, setTags] = useState(() => lsGet(TAGS_KEY, {}));
  const [tickets, setTickets] = useState(() => lsGet(TICKETS_KEY, {}));
  const [hidden, setHidden] = useState(() => lsGet(HIDDEN_KEY, {}));
  const [djOverrides, setDjOverrides] = useState(() => lsGet(DJ_OVERRIDE_KEY, {}));
  const [manual, setManual] = useState(() => lsGet(MANUAL_KEY, []));
  const [overridesTick, setOverridesTick] = useState(0); // incremented whenever overrides change; triggers allEvents recompute
  const PREFS_DEFAULTS = {
    regions: [],
    genres: [],
    freeOnly: false,
    allAgesOnly: false,
    showSaved: false,
    subgenres: [],
    showDJ: false,
    showHidden: false,
    showTickets: false,
    showStarredNoTicket: false,
    hideRecurring: false,
    recurringOnly: false,
    timeBuckets: [],
    timeRange: [0, 1439],
    recencyMode: 'da',
    recencyWindow: null,
    dateRange: null,
  };
  const [prefs, setPrefs] = useState(() => {
    // Always merge defaults first so new keys are never undefined
    const stored = lsGet(PREFS_KEY, {});
    const saved = { ...PREFS_DEFAULTS, ...stored };
    return saved;
  });
  const [showAdd, setShowAdd] = useState(false);
  const [editingEvent, setEditingEvent] = useState(null); // event object being edited
  const [myChangesView, setMyChangesView] = useState(false); // session-only, not persisted
  const [showInstall, setShowInstall] = useState(true);
  const [showMoreFilters, setShowMoreFilters] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [swUpdate, setSwUpdate] = useState(false); // true when a new SW is waiting
  const [driveUser, setDriveUser] = useState(null);
  const [driveSyncing, setDriveSyncing] = useState(false);
  const [driveSyncMsg, setDriveSyncMsg] = useState('');
  const [searchQuery, setSearchQuery] = useState('');
  const [artistPanel, setArtistPanel] = useState(null); // { name, event }
  const [venuePanel, setVenuePanel] = useState(null);   // venueName string
  const [panelHistory, setPanelHistory] = useState([]); // [{ type:'artist'|'venue', value }]

  // ── Browser back button / mouse back ─────────────────────────────
  // Push a synthetic history entry whenever any panel is open so that
  // the browser back button (and back-swipe on desktop browsers) fires
  // popstate instead of actually navigating away.
  const anyPanelOpen = !!(artistPanel || venuePanel);
  useEffect(() => {
    if (anyPanelOpen) {
      window.history.pushState({ bayShowsPanel: true }, '');
    }
  }, [anyPanelOpen]);

  useEffect(() => {
    const onPopState = (e) => {
      // Only intercept if we have a panel open — let normal navigation through otherwise
      if (!artistPanel && !venuePanel) return;
      // Prevent the default navigation
      e.preventDefault();
      // Treat as a back press: same logic as the ← button
      if (panelHistory.length > 0) {
        const prev = panelHistory[panelHistory.length - 1];
        setPanelHistory(h => h.slice(0, -1));
        setArtistPanel(null);
        setVenuePanel(null);
        if (prev.type === 'venue') setVenuePanel(prev.value);
        else if (prev.type === 'artist') setArtistPanel(prev.value);
        // Re-push so the next back press is still intercepted
        window.history.pushState({ bayShowsPanel: true }, '');
      } else {
        setArtistPanel(null);
        setVenuePanel(null);
        setPanelHistory([]);
      }
    };
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, [artistPanel, venuePanel, panelHistory]);

  // ── Left-edge swipe to go back (mobile) ──────────────────────────
  // Only fires when a panel is open; threshold is 60px horizontal with
  // less than 60px vertical drift to avoid conflicting with scroll.
  const touchStartRef = useRef(null);
  useEffect(() => {
    const onTouchStart = (e) => {
      if (!artistPanel && !venuePanel) return;
      const t = e.touches[0];
      touchStartRef.current = { x: t.clientX, y: t.clientY };
    };
    const onTouchEnd = (e) => {
      if (!touchStartRef.current || (!artistPanel && !venuePanel)) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartRef.current.x;
      const dy = Math.abs(t.clientY - touchStartRef.current.y);
      touchStartRef.current = null;
      // Right swipe: dx > 60px, vertical drift < 60px
      if (dx > 60 && dy < 60) {
        if (panelHistory.length > 0) {
          const prev = panelHistory[panelHistory.length - 1];
          setPanelHistory(h => h.slice(0, -1));
          setArtistPanel(null);
          setVenuePanel(null);
          if (prev.type === 'venue') setVenuePanel(prev.value);
          else if (prev.type === 'artist') setArtistPanel(prev.value);
          window.history.pushState({ bayShowsPanel: true }, '');
        } else {
          setArtistPanel(null);
          setVenuePanel(null);
          setPanelHistory([]);
        }
      }
    };
    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchend', onTouchEnd, { passive: true });
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchend', onTouchEnd);
    };
  }, [artistPanel, venuePanel, panelHistory]);

  const scrollRef = useRef(null);
  const dayRefs = useRef({}); // { [dayKey]: domNode }

  // Debounced tag write
  const _debouncedTagWrite = useRef(null);
  if (!_debouncedTagWrite.current) {
    _debouncedTagWrite.current = debounce(async (tagObj) => {
      const tok = await getOrRefreshToken();
      if (!tok) return;
      try { await driveWrite(tok, GOOG_TAGS_FILE, tagObj); } catch {}
    }, 600);
  }

  const runDriveSync = useCallback(async (token) => {
    setDriveSyncing(true);
    setDriveSyncMsg('');
    try {
      const ui = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${token}` } });
      const user = await ui.json();
      if (!user.email) throw new Error('Could not fetch user info');
      setDriveUser({ email: user.email });
      lsSet(GDRIVE_USER_KEY, { email: user.email });
      scheduleTokenRefresh();
      const drivePrefs = await driveRead(token, GOOG_PREFS_FILE);
      if (drivePrefs) { savePrefs({ ...PREFS_DEFAULTS, ...prefs, ...drivePrefs }); }
      else { await driveWrite(token, GOOG_PREFS_FILE, prefs); }
      const localTags = lsGet(TAGS_KEY, {});
      const driveTags = await driveRead(token, GOOG_TAGS_FILE);
      if (driveTags) {
        const merged = mergeTags(localTags, driveTags);
        setTags(merged); lsSet(TAGS_KEY, merged);
        await driveWrite(token, GOOG_TAGS_FILE, merged);
        const added = Object.keys(merged).length - Object.keys(localTags).length;
        setDriveSyncMsg(added > 0 ? `Synced — ${added} saved show${added > 1 ? 's' : ''} restored` : 'Synced with Drive');
      } else {
        await driveWrite(token, GOOG_TAGS_FILE, localTags);
        setDriveSyncMsg(`Signed in · ${Object.keys(localTags).length} shows backed up`);
      }
    } catch (e) { setDriveSyncMsg('Sync error: ' + e.message); }
    finally { setDriveSyncing(false); setTimeout(() => setDriveSyncMsg(''), 6000); }
  }, [prefs]);

  useEffect(() => {
    // Immediately restore email badge from persistent store
    const savedUser = lsGet(GDRIVE_USER_KEY, null);
    if (savedUser && savedUser.email) setDriveUser(savedUser);
    // Then get/refresh a token and verify with Google
    getOrRefreshToken().then(tok => {
      if (!tok) return;
      scheduleTokenRefresh();
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${tok}` } })
        .then(r => r.json())
        .then(u => {
          if (u.email) { setDriveUser({ email: u.email }); lsSet(GDRIVE_USER_KEY, { email: u.email }); }
        }).catch(() => {});
    });
  }, []);

  const signInWithGoogle = useCallback(async () => {
    if (!GOOG_CLIENT_ID) { setDriveSyncMsg('Drive sync not configured'); return; }
    setDriveSyncing(true);
    setDriveSyncMsg('Opening Google sign-in tab…');
    try {
      const token = await openAuthTab();
      await runDriveSync(token);
    } catch (e) {
      setDriveSyncMsg(e.message === 'popup_blocked' ? 'Tab blocked — allow pop-ups in Safari settings' : 'Sign-in failed: ' + e.message);
      setDriveSyncing(false);
      setTimeout(() => setDriveSyncMsg(''), 7000);
    }
  }, [runDriveSync]);

  const reSyncDrive = useCallback(async () => {
    const tok = await getOrRefreshToken();
    if (tok) { runDriveSync(tok); return; }
    signInWithGoogle();
  }, [runDriveSync, signInWithGoogle]);

  const syncPrefsToDrive = useCallback(async (newPrefs) => {
    const tok = await getOrRefreshToken();
    if (!tok) return;
    try { await driveWrite(tok, GOOG_PREFS_FILE, newPrefs); } catch {}
  }, []);

  const snapRef = useRef(false);

  const saveTags = t => { setTags(t); lsSet(TAGS_KEY, t); _debouncedTagWrite.current(t); };
  const savePrefs = p => { setPrefs(p); lsSet(PREFS_KEY, p); syncPrefsToDrive(p); };
  const saveManual = m => {
    // m is the new manual array (prepend style); write to MANUAL_KEY for legacy compat.
    // Do NOT rebuild ov.adds here — AddModal already writes directly to overrides.adds
    // before calling onSave, so rebuilding from m (stale React state) would drop events.
    setManual(m); lsSet(MANUAL_KEY, m);
    setOverridesTick(t => t + 1);
  };

  const load = useCallback(async (force = false) => {
    if (force) { lsSet(CACHE_KEY, null); setRefreshing(true); }
    setError(null);
    try {
      const { events: fetched, meta, artistLinks: fetchedLinks, fromCache, ts } = await fetchEvents();
      if (!snapRef.current) {
        const snap = lsGet(SNAP_KEY, null);
        if (!snap) {
          const newSnap = {};
          fetched.forEach(e => { newSnap[e.id] = 1; });
          lsSet(SNAP_KEY, newSnap);
        }
        snapRef.current = true;
      }
      // Migrate tags/tickets/hidden from superseded local adds to their server replacements
      const migration = migrateSupersededLocalAdds(
        fetched,
        lsGet(TAGS_KEY, {}),
        lsGet(TICKETS_KEY, {}),
        lsGet(HIDDEN_KEY, {})
      );
      if (migration) {
        if (migration.tags)    { setTags(migration.tags);       lsSet(TAGS_KEY,    migration.tags); }
        if (migration.tickets) { setTickets(migration.tickets); lsSet(TICKETS_KEY, migration.tickets); }
        if (migration.hidden)  { setHidden(migration.hidden);   lsSet(HIDDEN_KEY,  migration.hidden); }
        setOverridesTick(t => t + 1);
      }
      setEvents(fetched);
      setArtistLinks(fetchedLinks || {});
      setCacheInfo({ fromCache, ts, meta });
    } catch (err) {
      setError(err.message);
      const stale = lsGet(CACHE_KEY);
      if (stale && stale.events) { setEvents(stale.events); setArtistLinks(stale.artistLinks || {}); setCacheInfo({ fromCache: true, ts: stale.ts, stale: true }); }
    } finally { setLoading(false); setRefreshing(false); }
  }, []);

  useEffect(() => { load(); }, []);

  useEffect(() => {
    // ── Hash-fragment auth fallback (Firefox Focus, Brave, etc.) ──────────────
    // auth.html redirects back here with #bay_auth={tokenData} when postMessage
    // is blocked. Read it, store it, strip the hash, then continue normally.
    (function readAuthHash() {
      try {
        const hash = window.location.hash;
        if (!hash.startsWith('#bay_auth=')) return;
        const tokenData = JSON.parse(decodeURIComponent(hash.slice('#bay_auth='.length)));
        if (tokenData && tokenData.access_token) {
          try { localStorage.setItem('bay-gdrive-token-v1', JSON.stringify(tokenData)); } catch(e) {}
        }
        // Strip hash so it doesn't linger in history or re-trigger on reload
        window.history.replaceState(null, '', window.location.pathname);
      } catch(e) {}
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/bay-shows/sw.js')
        .then(reg => {
          // Store registration for update button
          window._swReg = reg;
          // If a new SW is waiting on arrival, surface the update banner immediately
          if (reg.waiting) setSwUpdate(true);
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                setSwUpdate(true);
              }
            });
          });
        })
        .catch(console.warn);
      // When the new SW takes over, reload to get fresh assets
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  }, []);

  // Apply local overrides on top of server events, then attach DJ classification.
  const allEvents = useMemo(() => {
    const ov = loadOverrides();
    const builtAt = cacheInfo && cacheInfo.meta && cacheInfo.meta.built_at
      ? cacheInfo.meta.built_at : null;

    // Build lookup maps
    const cancelSet  = new Set(ov.cancels.map(c => c.event_id));
    const cancelMeta = Object.fromEntries(ov.cancels.map(c => [c.event_id, c]));
    const editMap    = Object.fromEntries(ov.edits.map(ed => [ed.event_id, ed]));

    // Merge server events with local overrides
    const serverMerged = events.map(e => {
      let out = { ...e };
      // Apply local cancel (may already have server _cancelled)
      if (cancelSet.has(e.id)) {
        out._cancelled    = true;
        out._cancelPending = isPending(cancelMeta[e.id].submittedAt, builtAt);
      }
      // Apply local edit fields
      if (editMap[e.id]) {
        const ed = editMap[e.id];
        const nonEmpty = Object.fromEntries(
          Object.entries(ed.fields || {}).filter(([, v]) => v !== '' && v !== null && v !== undefined)
        );
        out = { ...out, ...nonEmpty, _edited: true,
                _editPending: isPending(ed.submittedAt, builtAt) };
      }
      // Clear server pending flags if built_at is newer
      if (out._cancelPending && builtAt && !isPending(null, builtAt)) out._cancelPending = false;
      if (out._editPending   && builtAt && !isPending(null, builtAt)) out._editPending   = false;
      return out;
    });

    // Local adds (migrated from manual + any new community adds)
    const localAdds = ov.adds.map(e => ({
      ...e,
      _manual: !e.community,
      _localAdd: true,        // marks ANY local add (manual or community) — never on server events
      _cancelPending: false,
      _editPending:   false,
    }));

    return [...localAdds, ...serverMerged].map(e => ({
      ...e,
      _isDJ: classifyDJ(e, djOverrides)
    }));
  }, [events, overridesTick, djOverrides, cacheInfo]);

  // Sorted unique venue list for AddModal dropdown
  const venueList = useMemo(() =>
    [...new Set(allEvents.map(e => e.v).filter(Boolean))].sort((a, b) => a.localeCompare(b)),
    [allEvents]
  );

  // IDs of all locally-modified events (adds + edits + cancels)
  // IDs of all locally-modified events — derived from allEvents (the already-merged
  // result) so it stays in sync without any separate localStorage read or dep juggling.
  const myChangedIds = useMemo(() => {
    const email = driveUser && driveUser.email;
    const ids = new Set();
    allEvents.forEach(e => {
      // Server-confirmed submissions by this signed-in user
      if (email && e.community && e.submittedBy === email) ids.add(e.id);
      // Local adds not yet rebuilt into server feed
      if (e._localAdd) ids.add(e.id);
      // Locally edited or cancelled
      if (e._edited || e._editPending) ids.add(e.id);
      if (e._cancelPending) ids.add(e.id);
    });
    return ids;
  }, [allEvents, driveUser]);

  // Filtered events (respects all prefs + search)
  const filtered = useMemo(() => {
    const today = todayStr();
    const q = searchQuery.trim().toLowerCase();

    // My Changes: show all locally-touched events regardless of other filters
    if (myChangesView) {
      return allEvents
        .filter(e => myChangedIds.has(e.id) && e.d >= today)
        .sort((a, b) => {
          if (a.d !== b.d) return a.d < b.d ? -1 : 1;
          return midpointMins(a) - midpointMins(b);
        });
    }

    return allEvents.filter(e => {
      if (!e.d || e.d < today) return false;

      // Remove expired events
      if (hasEnded(e)) return false;

      // Hidden filter
      if (!prefs.showHidden && hidden[e.id]) return false;

      // DJ / club filter — all 19hz events hidden by default
      // showDJ must be explicitly true to surface them
      if (e._isDJ && prefs.showDJ !== true) return false;
      // Recurring filter
      if (prefs.hideRecurring && e.rec) return false;
      if (prefs.recurringOnly && !e.rec) return false;

      if (prefs.freeOnly && !(e.p === '0' || e.p === 0 || e.pr === 'free')) return false;
      if (prefs.allAgesOnly && !(e.age === 'all' || e.age === 'all-ages')) return false;
      if (prefs.showSaved && !tags[e.id]) return false;
      if (prefs.showTickets && !tickets[e.id]) return false;
      if (prefs.showStarredNoTicket && !(tags[e.id] && !tickets[e.id])) return false;
      if (prefs.regions && prefs.regions.length > 0 && !prefs.regions.includes(e.r)) return false;
      if (prefs.genres && prefs.genres.length > 0 && !prefs.genres.includes(resolveGenre(e.g))) return false;
      if (prefs.subgenres && prefs.subgenres.length > 0) {
        const evSgs = Array.isArray(e.sg) ? e.sg : [e.sg || ''];
        if (!prefs.subgenres.some(sg => evSgs.some(s => s === sg || s.toLowerCase() === sg.toLowerCase()))) return false;
      }
      // Time-of-day bucket filter
      if (prefs.timeBuckets && prefs.timeBuckets.length > 0) {
        if (!prefs.timeBuckets.includes(timeBucket(e))) return false;
      }
      // Start/end time range slider
      if (prefs.timeRange && (prefs.timeRange[0] > 0 || prefs.timeRange[1] < 1439)) {
        const { startMins, endMins } = eventTimings(e);
        if (startMins > prefs.timeRange[1] || (endMins % 1440) < prefs.timeRange[0]) return false;
      }
      // Recency filter — da/dm can be "YYYY-MM-DD" string OR ms timestamp number.
      // Normalise both to "YYYY-MM-DD" for comparison.
      if (prefs.recencyWindow) {
        const raw = prefs.recencyMode === 'dm' ? e.dm : e.da;
        if (!raw) return false;
        let evDateStr; // "YYYY-MM-DD"
        if (typeof raw === 'number') {
          const d = new Date(raw);
          evDateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        } else {
          // Already a string — take just the date portion
          evDateStr = String(raw).slice(0, 10);
        }
        const today = todayStr();
        if (prefs.recencyWindow === '1d') {
          if (evDateStr !== today) return false;
        } else if (prefs.recencyWindow === '7d') {
          // today and the 6 prior days
          const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 6);
          const cutoffStr = `${cutoff.getFullYear()}-${pad(cutoff.getMonth()+1)}-${pad(cutoff.getDate())}`;
          if (evDateStr < cutoffStr) return false;
        } else if (prefs.recencyWindow && prefs.recencyWindow.since) {
          if (evDateStr < prefs.recencyWindow.since) return false;
        }
      }
      // Search
      if (q) {
        const haystack = [fmtA(e.a), e.v, fmtSg(e.sg), e.n].filter(Boolean).join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      // Date range filter
      if (prefs.dateRange) {
        if (prefs.dateRange === 'today') {
          if (e.d !== today) return false;
        } else if (prefs.dateRange === 'thisWeekend') {
          const [ey, em, ed] = e.d.split('-').map(Number);
          const dow = new Date(ey, em - 1, ed).getDay();
          // Find coming Friday and Sunday
          const now = new Date();
          const todayDow = now.getDay();
          // Days until Friday (5): if today is Mon(1) → 4 days ahead; wrap Sun(0) → 5 days ahead
          const daysToFri = (5 - todayDow + 7) % 7 || 7;
          const fri = new Date(now); fri.setDate(now.getDate() + (todayDow === 5 ? 0 : todayDow === 6 ? 6 : daysToFri));
          const sun = new Date(fri); sun.setDate(fri.getDate() + 2);
          const friStr = `${fri.getFullYear()}-${pad(fri.getMonth()+1)}-${pad(fri.getDate())}`;
          const sunStr = `${sun.getFullYear()}-${pad(sun.getMonth()+1)}-${pad(sun.getDate())}`;
          if (e.d < friStr || e.d > sunStr) return false;
        } else if (prefs.dateRange && typeof prefs.dateRange === 'object') {
          if (prefs.dateRange.from && e.d < prefs.dateRange.from) return false;
          if (prefs.dateRange.to   && e.d > prefs.dateRange.to)   return false;
        }
      }
      return true;
    }).sort((a, b) => {
      if (a.d !== b.d) return a.d < b.d ? -1 : 1;
      return midpointMins(a) - midpointMins(b);
    });
