name = "bay-shows-auth"
main = "bay-shows-auth-worker.js"
compatibility_date = "2024-01-01"

# ES module format — required for export default syntax and env parameter
# (The old service worker format used addEventListener and globals instead)

[[kv_namespaces]]
binding = "BAY_SHOWS_KV"
id = "c147b88511d34e77bceb9f2683df6fc6"

# GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET are set via the Cloudflare dashboard
# under Worker → Settings → Variables and Secrets (not here — secrets should
# never be committed to source control)
