<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bay Shows — Signing in…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0f0;
      font-family: 'JetBrains Mono', monospace, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 36px; }
    .title { font-size: 14px; color: #a0a0c0; letter-spacing: 0.05em; }
    .status { font-size: 12px; color: #6060a0; margin-top: 4px; }
    .error { color: #ff4444; font-size: 12px; max-width: 300px; }
    .btn {
      margin-top: 8px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #5b6cff;
      color: #5b6cff;
      font-family: inherit;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="icon">☁</div>
  <div class="title">BAY SHOWS</div>
  <div class="status" id="status">Connecting to Google…</div>
  <div class="error" id="error" style="display:none"></div>
  <button class="btn" id="retryBtn" style="display:none" onclick="startAuth()">Try Again</button>

  <script src="https://accounts.google.com/gsi/client" onload="onGISLoad()" onerror="showError('Failed to load Google auth library. Check your connection.')"></script>

  <script>
    // ── Config — must match index.html ─────────────────────────
    const GOOG_CLIENT_ID  = '1030489561991-kbu11qmn3o58ahu69d27f3g09qhai1ns.apps.googleusercontent.com';
    const GOOG_SCOPE      = 'https://www.googleapis.com/auth/drive.file';
    const GDRIVE_AUTH_KEY = 'bay-gdrive-token-v1';
    // ───────────────────────────────────────────────────────────

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showError(msg) {
      setStatus('Sign-in failed');
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('retryBtn').style.display = 'inline-block';
    }

    function onGISLoad() {
      setStatus('Google loaded — requesting access…');
      // Small delay to ensure GIS is fully ready
      setTimeout(startAuth, 300);
    }

    function startAuth() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
      setStatus('Opening Google sign-in…');

      try {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GOOG_CLIENT_ID,
          scope: GOOG_SCOPE,
          callback: (resp) => {
            if (resp.error) {
              showError('Google error: ' + resp.error + (resp.error_description ? ' — ' + resp.error_description : ''));
              return;
            }
            // Store token to localStorage — main app will read this
            const tok = {
              access_token: resp.access_token,
              expires_at: Date.now() + (resp.expires_in || 3600) * 1000
            };
            try {
              localStorage.setItem(GDRIVE_AUTH_KEY, JSON.stringify(tok));
              setStatus('Signed in ✓ — returning to app…');
              // Give the main app a moment to detect the storage event before we close
              setTimeout(() => {
                try { window.close(); } catch(e) {}
                // Fallback if window.close() is blocked: show instructions
                setTimeout(() => {
                  setStatus('Done! You can close this tab and return to Bay Shows.');
                }, 800);
              }, 400);
            } catch(e) {
              showError('Could not save token: ' + e.message);
            }
          }
        });

        // 'consent' always shows the account picker — required on first auth
        client.requestAccessToken({ prompt: 'consent' });
      } catch(e) {
        showError('Could not initialise Google auth: ' + e.message);
      }
    }
  </script>

</body>
</html>
