<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bay Shows — Signing in…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0f0;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .icon  { font-size: 36px; }
    .title { font-size: 14px; color: #a0a0c0; letter-spacing: 0.05em; }
    .status { font-size: 12px; color: #6060a0; margin-top: 4px; min-height: 18px; }
    .error { color: #ff6060; font-size: 11px; max-width: 300px; line-height: 1.5; }
    .btn {
      margin-top: 8px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #5b6cff;
      color: #5b6cff;
      font-family: inherit;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="icon">☁</div>
  <div class="title">BAY SHOWS</div>
  <div class="status" id="status">Connecting…</div>
  <div class="error" id="error" style="display:none"></div>
  <button class="btn" id="retryBtn" style="display:none" onclick="startAuth()">Try Again</button>
  <button class="btn" id="closeBtn" style="display:none" onclick="window.close()">Close Tab</button>

  <script>
    const WORKER_BASE     = 'https://bay-shows-auth.dranahan.workers.dev';
    const GDRIVE_AUTH_KEY = 'bay-gdrive-token-v1';

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function showError(msg) {
      setStatus('');
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('retryBtn').style.display = 'inline-block';
    }
    function showSuccess() {
      setStatus('Signed in ✓ — returning to app…');
      document.getElementById('closeBtn').style.display = 'inline-block';
    }

    function startAuth() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
      document.getElementById('closeBtn').style.display = 'none';
      setStatus('Redirecting to Google…');
      window.location.href = `${WORKER_BASE}/auth`;
    }

    function handleReturn() {
      const params     = new URLSearchParams(window.location.search);
      const token      = params.get('access_token');
      const expiresIn  = parseInt(params.get('expires_in') || '3600', 10);
      const error      = params.get('error');

      if (error) {
        const messages = {
          'google_error:access_denied': 'Sign-in cancelled.',
          'invalid_state':              'Session expired — please try again.',
          'token_exchange_failed':      'Google token exchange failed. Try again.',
        };
        showError(messages[error] || `Sign-in error: ${error}`);
        return;
      }

      if (token) {
        const tok = {
          access_token: token,
          expires_at:   Date.now() + expiresIn * 1000,
        };
        try {
          localStorage.setItem(GDRIVE_AUTH_KEY, JSON.stringify(tok));
        } catch(e) {
          showError('Could not save token: ' + e.message);
          return;
        }
        window.history.replaceState(null, '', window.location.pathname);
        showSuccess();
        setTimeout(() => { try { window.close(); } catch(e) {} }, 600);
        return;
      }

      // No params — fresh open, kick off the flow
      startAuth();
    }

    handleReturn();
  </script>
</body>
</html>
