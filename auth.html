<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bay Shows — Signing in…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0f0;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .icon  { font-size: 36px; }
    .title { font-size: 14px; color: #a0a0c0; letter-spacing: 0.05em; }
    .status { font-size: 12px; color: #6060a0; margin-top: 4px; min-height: 18px; }
    .error { color: #ff6060; font-size: 11px; max-width: 300px; line-height: 1.5; }
    .btn {
      margin-top: 8px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #5b6cff;
      color: #5b6cff;
      font-family: inherit;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="icon">♪</div>
  <div class="title">BAY SHOWS</div>
  <div class="status" id="status">Connecting…</div>
  <div class="error" id="error" style="display:none"></div>
  <button class="btn" id="retryBtn" style="display:none" onclick="startAuth()">Try Again</button>
  <button class="btn" id="closeBtn" style="display:none" onclick="window.close()">Close Tab</button>
  <script>
    const WORKER_BASE     = 'https://bay-shows-auth.dranahan.workers.dev';
    const GDRIVE_AUTH_KEY = 'bay-gdrive-token-v1';
    const APP_ORIGIN      = 'https://helpmeimstuckinasimulation.github.io';

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function showError(msg) {
      setStatus('');
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('retryBtn').style.display = 'inline-block';
    }
    function showSuccess() {
      setStatus('Signed in ✓ — returning to app…');
      document.getElementById('closeBtn').style.display = 'inline-block';
    }
    function startAuth() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
      document.getElementById('closeBtn').style.display = 'none';
      setStatus('Redirecting to Google…');
      window.location.href = `${WORKER_BASE}/auth`;
    }

    function handleReturn() {
      const params    = new URLSearchParams(window.location.search);
      const token     = params.get('access_token');
      const expiresIn = parseInt(params.get('expires_in') || '3600', 10);
      const error     = params.get('error');

      if (error) {
        const messages = {
          'google_error:access_denied': 'Sign-in cancelled.',
          'invalid_state':              'Session expired — please try again.',
          'token_exchange_failed':      'Google token exchange failed. Try again.',
        };
        showError(messages[error] || `Sign-in error: ${error}`);
        // Also notify opener of failure so it can reject cleanly
        if (window.opener) {
          try {
            window.opener.postMessage(
              { type: 'BAY_SHOWS_AUTH', error: messages[error] || error },
              APP_ORIGIN
            );
          } catch(e) {}
        }
        return;
      }

      if (token) {
        const tokenData = {
          access_token: token,
          expires_at:   Date.now() + expiresIn * 1000,
        };

        // 1. Write to localStorage (fallback for non-isolated contexts)
        try { localStorage.setItem(GDRIVE_AUTH_KEY, JSON.stringify(tokenData)); } catch(e) {}

        // 2. postMessage to opener — works even when localStorage is isolated
        //    (iOS Safari standalone PWA has separate localStorage per context)
        if (window.opener) {
          try {
            window.opener.postMessage(
              { type: 'BAY_SHOWS_AUTH', ...tokenData },
              APP_ORIGIN
            );
          } catch(e) {}
        }

        // 3. Also try BroadcastChannel for same-origin cases where opener ref is lost
        try {
          const bc = new BroadcastChannel('bay_shows_auth');
          bc.postMessage({ type: 'BAY_SHOWS_AUTH', ...tokenData });
          setTimeout(() => bc.close(), 1000);
        } catch(e) {}

        // Clean URL so token doesn't linger in history
        window.history.replaceState(null, '', window.location.pathname);
        showSuccess();
        // Give postMessage time to deliver before closing
        setTimeout(() => { try { window.close(); } catch(e) {} }, 800);
        return;
      }

      // No params — fresh open, kick off the flow
      startAuth();
    }

    handleReturn();
  </script>
</body>
</html>
